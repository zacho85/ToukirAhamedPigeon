# Main domain - HTTPS (external)
server {
    listen 443 ssl;
    server_name kongossapay.com www.kongossapay.com;

    ssl_certificate /etc/letsencrypt/live/kongossapay.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kongossapay.com/privkey.pem;
    client_max_body_size 100M;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# Main domain - HTTP redirect to HTTPS
server {
    listen 80;
    server_name kongossapay.com www.kongossapay.com;
    client_max_body_size 100M;
    return 301 https://$host$request_uri;
}

# API subdomain - HTTP (internal container access)
server {
    listen 80;
    server_name api.kongossapay.com;
    client_max_body_size 100M;

    location /uploads/ {
        alias /backend-uploads/;
        # No CORS headers here - let backend handle them
    }

    location / {
        proxy_pass http://kongossa-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}

# API subdomain - HTTPS (external access)
server {
    listen 443 ssl;
    server_name api.kongossapay.com;

    ssl_certificate /etc/letsencrypt/live/kongossapay.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kongossapay.com/privkey.pem;
