
# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name api.kongossapay.com kongossapay.com www.kongossapay.com;
    return 301 https://$host$request_uri;
}

# Main domain - HTTPS
server {
    listen 443 ssl http2;
    server_name kongossapay.com www.kongossapay.com;

    ssl_certificate /etc/letsencrypt/live/kongossapay.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kongossapay.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

# API subdomain - HTTPS
server {
    listen 443 ssl http2;
    server_name api.kongossapay.com;

    ssl_certificate /etc/letsencrypt/live/kongossapay.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kongossapay.com/privkey.pem;

    location / {
        proxy_pass http://kongossa-backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' 'https://kongossapay.com' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Stripe-Signature' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        # Preflight requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://kongossapay.com' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Stripe-Signature' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain';
            return 204;
        }
    }
}
